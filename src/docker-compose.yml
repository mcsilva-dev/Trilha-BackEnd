services:
    mysql:
        image: mysql:8.0
        container_name: sghss_db
        enviroment:
            MYSQL_ROOT_PASSWORD: vidaplus123
            MYSQL_DATABASE: sghss_db
            MYSQL_USER: admin
            MYSQL_PASSWORD: admin
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pvidaplus123"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    mysql_data:        